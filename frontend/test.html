<!DOCTYPE html>
<html>
<body>

<h2>AI Diet Test</h2>
<button onclick="sendData()">Get Diet Plan</button>

<pre id="result"></pre>

<script>
function sendData() {
  fetch('http://127.0.0.1:5000/diet', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      weight: 70,
      goal: "fat loss"
    })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("result").innerText = data.diet_plan;
  })
  .catch(err => {
    console.error(err);
    document.getElementById("result").innerText = "Error: " + err;
  });
}
</script>

</body>
</html>
